body:
  text: 一者執壇二者禮謁三者出入四者坐起五者執瓶六者洗漱七者巾器八者齋食九者請法十者護持此之十事是吾教門中事也當付汝等習而行之勸教男女昇入仙品無想稽首扣頭著地長跪信受執坐壇品第一夫坐壇者隔凡去穢護淨自持擅道德之不羣慕天眞之髙迹第一起坐出入常不離身若因事暫放不得輒安雜穢之所先以具拂拭其所或以淨物盛之第二每將行用或掛膊上或搭左手以縁口向外第三每欲作拜禮先將右手提角懸起便將左手以三指挾極兩頭平放下面著地第四先舉左足心安第二稜上立次舉右足向上半跪而鋪務在平正第五拱手起退右足歸第二稜上立平穩乃禮三拜訖第六便起仰右手就角二指取收勿令觸他或取中稜亦得第七著鞋履訖便過入左手側身而摺勿近人面第八摺訖掛於左手以道衣霞帔覆之向前起居禮謁品第二夫禮謁者一名屈已二名敬已三名敬他心敬難識形屈可見故須形禮殷勤以表内心珎重屈已致敬爲有所求事有一十二種一慚愧二悔謝三求法四除傲慢五尊德六慰賀七滅罪八懲戒九報恩十物奉十一現世人歡喜十二未來天下恭敬第一禮謁安詳得所容止可觀第二秉簡當心端身平立第三五體投地前後平齊第四見尊像經法或值禮懴法事必須作禮第五見尊師名德必須作禮第六見受業師作禮第七見勝已善友作禮第八見四海同學作禮第九事師辤去及歸室宿已上皆先作禮言限來日珍重而去到家亦須作禮然後起居問訊安否第十辤出外境及歸或經月或經年且須先禮三拜然後長跪伏地重感拜訖乃通寒温起居此爲事師之禮第十一或師主隔絶他州别縣相去稀踈久經歲月皆須作禮長跪言其情狀伏地悲感再拜起居若彼此曾有吉凶言及皆須稱賀弔慰再拜第十二吉凶慶弔則悲禮畢然後重悲待長者語畢又須作禮若自受慶弔亦然第十三若得長者善言教示或責辱訓罰皆須作禮言謝低聲以酬德教第十四凡受禮拜皆須擎拳拱手辭謝推高託尊第十五凡禮拜師皆須待坐合拜須坐而受若師自外逺還送至方丈待師坐定然後作禮不得於門下廊下怱怱即事第十六凡在殿堂對聖像及師長大德皆不得受人禮拜若他人不知忽然作禮須言其事止之忽於殿堂見年尊有德者亦須言其事云未敢就便作禮出入品第三第一凡行住有難處置疑處皆須要伴不得獨行以自明白故第二逺近出入皆須辤徒弟衆或同院䆫無人須向童行說去甚處某時即歸第三若徃男女非類之處或因吉凶齋㑹暫時停止解脫出入羣徒共住一處不得獨因親故潜隱幽僻之處來須逐伴去則隨衆第四若非急難事有所需求不須頻頻出入數令人見自致輕薄第五出入若逢官長預須隱避勿令露現苟無隱處宜向僻處或人影𣗳影中立仍須斂容恭敬第六出入忽逢尊貴車馬輦輿並須避道低身偎形第七若無急事不須冐渉風雨泥塗隆寒大熱披褐狼籍人所惡見第八出入城邑聚落人物之處行立須是斂容正色不得高聲大笑若有咨問皆須以禮言對非急事不語爲上第九凡出入遇惡人愚人童稚邪言穢語相輕調謔猶若不聞勿變顔色第十出入不計逺近皆須坐壇相隨仍用手巾瓶等與住時相似並適其宜第十一若值雜牀或施主家事須寢宿即覓水灑牀席以巾拭之名曰靜牀用之無觸第十二出入城市村曲見人行非禮不軌之事或聞不善調謔之詞即低頭直過愼勿顧之第十三女冠出入無論逺近疑與不疑必須逐伴相隨以避嫌疑第十四凡經像及大人門戸出入勿向中門必從邊小門側身進退坐起品第四第一凡起坐法有尊有卑若無上下稟承此與異𩔖無别第二法㑹之所男官一人向前三禮長跪拱手云巳下法小師某甲請坐第三女冠二人亦如前請坐若有像處大師念禮經像童子亦然善男安置得所第四凡對經像長者行處須整斂容貌不得倨傲放誕言辭非法第五凡對經像長者不得背經法尊像大人師長第六侍從尊師及長者所在皆須正立不得倚托牀壁及諸等物第七侍從師長但須整肅非顧問勿語第八凡侍從師長所在且須立地待命與坐再三指揮然後稽首致謝而坐第九凡侍從師長之所人或更尊於師長即從前人所命仍須謝於前人而坐第十凡齋堂講習經典禮懴法事之所坐起須依法位不得越坐一如科戒定式所排第十一凡法堂宣經之後忽若後來須方便隨處而坐縱恃尊德亦須隨便不得向前起動喧撓第十二凡一坐而後若非急事不得數有起動岀入亂人第十三凡所在之處行住坐卧不得與非𩔖之人混同一處第十四凡師長尊上及他人看讀書䟽委曲不干已事者不得向前窺視同爲無識執瓶品第五第一男不得將石榴瓶第二女不得將檳榔瓶第三須頻換水磨洗常令光淨不令塵垢穢汚第四瓶不得宿水在内第五夏月毎日易之一日不易名爲穢水第六冬月許兩日一易第七瓦瓶可三日一易不得安置穢處切宜忌之第八凡大小便處須别用瓶先淨於前後淨於前後然後以磚石磨手仍以灰皁角淨之如違不得朝眞陞殿禮師亦不得受人禮拜及隨大衆第九凡瓶用了須要置穩處勿令觸倒於此大忌第十凡瓶有人欲看并童稚提擎勿使穢手觸把須令潔淨第十一護瓶内外甚於餘物與經像潔淨一般洗漱品第六第一凡洗漱有四種一平旦漱二讀書漱三食後漱四卧起漱第二凡漱口並須三過第三若食後須用楊柳枝湯水一能洗穢二除齒風若無柳枝即用淨灰第四凡初用楊柳呪曰太陽和氣開春發柳折取一枝能淨身口學道修眞願度三有急急如律令第五凡用灰呪曰洗灰除垢用灰爲首穢去眞來淨心淨口成道度人天長地久急急如律令第六漱盥皆偏側并背人不得當人爲之第七凡用水不得以手觸盆中水當以木杓於盆中取又不得著杓於盆中觸第八旣有犯觸當須自首懴悔仍自役力換水置中即不結罪第九漱口洗面不得漱縮作聲鼻口泡出又不得扣打水器驚衆第十凡用水不得狼籍括踏第十一口中穢水不得噀噴於衆人前及淨地上第十二凡用物不獨在水諸件等物皆須儉約而已不得等閑費用巾器品第七第一巾器者受用齋食第二齋食獻施聖凡最爲重事第三衣宜淨牀宜端潔故先鋪坐壇而後坐第四巾器宜淨故先洗手而後執器第五先行淨水然後開器受食賢智以食爲天凡夫以食爲命故爲最重第六凡巾器二物其用一也若但安閑必同一處也第七巾器二事護淨如一但除齋食不得别用第八凡齋器别立龕架安置不得與諸器雜安古人號之曰齋器第九齋器有五事之體法有五行之用受五味之食銅漆製之隨力而辦第十凡齋巾二首厚宻布爲之長四尺編褫縫之恒令潔白齋食品第八第一凡齋時先立一人爲監堂亦名監齋齋者齊也專知鐘磬節奏檢校得失所以名監齋法師第二凡登齋就食必須潔淨衣冠第三先須淨手執器上堂安置於左以巾盛之第四凡禮懴隨衆多少一時平坐脫履坐底勿礙祗供人第五先須行淨水勿令器衝撞著人第六受水訖先取巾把中央角向前垂牀七寸鋪之次安齋器了又鋪第二巾於膝上並須仰手鋪之第七出齋器從一至五次第出之不得越亂第八監堂一人於堂上磬子處正立鳴磬一下奉爲當今皇帝祝延聖壽或應十方施主祈禳薦拔隨事舉楊諸施等事保護答報次師一人即令祝願其文出在七眞科中第九施粥呪曰今晨香粥上獻三尊利益家國饒益施主六道含靈普同飽滿第十施食呪曰一切福田中施食最爲先見存受快樂過去得生天當來居淨土衣食常自然是故今供養普獻於諸天第十一凡呪訖次行食監齋須先約語行食人必須教其食名分明高唱料量多少務在均平第十二行食訖監齋鳴磬一下云等供養齋官須一時稽首相顧恭敬然後方可就食第十三凡受食三徧自料取足勿令餘剩狼籍人所惡見不生敬信第十四凡聞唱食名須把器就手而受第十五不要者指㸃令去嫌多即退手嫌少即進手不得言喧第十六凡齋上下相顧望食遲者稍須急食食急者即須遲食務令齊整第十七凡齋食時監齋須都看之若過半食盡可再行第十八不得縱其本性令遲者嫌第十九凡食須細口急意徐勿令啜呷作聲觸擊匙筯負慈悲罪第二十凡齋坐食之後除非軍機急速水火盜賊死亡之事不得輒有言語喧括齋堂第二十一其齋須有教示處分必須自手指揮唯在低聲第二十二凡齋訖有餘果食等物収取與諸在下及乞病人等不得隨器將去第二十三食訖先摺膝上下巾次收齋器自第五至第一皆安巾上第二十四凡食訖當行淨水洗器收水訖鳴磬唱布施祝願訖唱餘迴施祝願其文具載七眞科戒中第二十五若非别緣貼會則不用祝文第二十六祝曰修齋巳畢尚恐功德未圎更捨淨財迴施三寳施者獲福功德圎滿第二十七施食祝曰三寳法食供養巳周轉施童役之人當願童稚同霑齋功無諸障礙第二十八鳴磬唱食訖普誦法食巳畢普被福田十方解脫三界安閑第二十九凡在齋中忽有犯戒者監齋須告白隨令犯者禮拜第三十又鳴磬唱勸善偈祝曰我衆等聞是法巳身心清靜如瑠璃瓶歡喜頂戴稽首敬禮無上三尊第三十一須唱三禮若有别緣唱三願更不具載第三十二齋事總畢鳴磬唱隨意並須稽首恭敬持器而去第三十三先後下起行列而行各歸房院不得羣集喧話撓亂清衆請法品第九夫法者名之爲寳人能敬受實爲妙也一則利已傳法教人二能益他同登妙果傳法之功進入仙階故曰請法必在珍重虔誠第一請法師有二種一者請法師演法講經傳科傳戒二者權時請授決其所疑並須禮拜殷勤珍重虔誠稽首第二講經演法須量大小逺近預前陳䟽其書皆須好紙眞楷如法淨潔不得造次麤弱言語輕怠第三凡授䟽者若小事先須禮三拜訖須執䟽長跪陳其意旨即拱手而授䟽於前人受䟽訖即禮三拜言謝而退第四凡大段事授䟽以執䟽作禮或七拜至九拜然後長跪面陳其事訖又三拜拜訖長跪授䟽授䟽竟即禮拜長跪言謝云小人蒙賜慈悲不勝多幸第五若前人未受䟽唯知禮拜不限徧數以許爲度如復未許即須宜且退更待後時再三稽首而授定志經云血出數斛心亦莫止自非志心扣幽靈囿肘皈師門頓首德宇終不造受也第六凡權請決疑先須三禮長跪拱手陳所疑事更三禮解說竟起拱手言謝云小子愚昧伏蒙法師不棄凡愚解說眞理不勝喜躍三禮而退第七或灼然年高德重來授䟽請齋或解說經義經題講論其理等宜平旦坐受拜䟽訖言告謝云小子愚懵不聞解說伏蒙見命不勝悚惕仍三禮答之敬其德也第八若是師長曾經受法業者或有授䟽命及者待禮三拜即伏地而受乃長跪即兩手横捧於頂良久乃放案上三禮長跪謝云死罪小子忽奉嚴命不勝惶悚又云不敢三禮而退第九凡言不敢有二種義受不敢辤辤則不敢受護持品第十夫護持者凡有七種一護法服二護法三護經四護師五護身六護十方施主七護一切衆生第一凡經像一種無别且如奉道科云凡經像所在皆須護淨竹架圍隔暫離即須淨巾蓋之凡有看讀開展不得過三行有事即隨手捲之卷軸未終不得暫停如急事此卷不了然後從首再行宣懴第二不得令不淨人并不淨身口穢氣觸動第三擬執經像須淨手意不得犯他物應上牀或推却諸物憑傍人爲之忽若無人自須小小推撥即洗手經牀上下亦然若把他物即須重洗手第四經像不得同房若黑漆等函著經像者又在橱内得權居卧息若素函及藴雖在橱内亦爲不可第五若在大堂之内宿集之所經日積夜或倦於法事疲怠之極止可暫時歇息仍須屈伏側身不得頓爾肆布脚手鼻口哮𪖙若有傍人須語之若聞不語與慢法同罪第六凡在四衆坐起行立不得招外人共語多有言笑第七凡勤學不如擇師師若德薄愼勿投剌既能修學必在明師似得於寳即盡力奉承極至道成不相離捨第八師若錯有過誤愼勿謗論宜隱然方便言拜咨陳再三巳依奉道科若别人言及其師善惡須分解力所不及拂起而去是名護師之相也第九凡師牀案几杖衣服朱墨一事巳上皆須護持不得觸汚第十凡在衆㑹忽有違犯經科爲衆所彈事應合罰即須踊躍歡喜愧恥言笑美樂受之此名爲能人滅無量罪此人學道速成無上善果是名大護持第十凡護持十方施主或相識不相識者上下男女大小貴賤内外逺近凡見皆敬奉居止來去安置坐起校諸驅使苦樂𩚑飽惡好逆順有無健病恭敬慰喻賞罰辱責皆須得所務在均平第十二凡含靈蠢動有命之物墮水落火但是危命之處是力所及皆須救護使得安寜第十三凡行住出入宿息過逢州縣名利親踈男女戲弄邪言預是衆生所疑更不須行是名護持一切衆生善果第十四若有再三違犯亂撓清衆彈紏不伏拒諌飾非者須吿白衆人退出齋次具如齋戒威儀論第十五道衣法服凡脫著切須摺打整齊或安袱帕或安靜處稽首畢方可脫著第十六若是於法請事徃徃傲戾好鬬爭者則須上下舉吿凶吉等事勿與徃還名曰幽殯莫令隨衆第十七凡受食受財皆讓少取爲儉唯省勿令衆生有嫌疑簿賤損命損德深得護持太上曰威儀說十事及諸律名總係一百四十餘條若能習而誦之勤而行之巳具前十事及諸科令總名護身巳所不犯又復教人此之善果計不能盡衆聖歡仰諸天慚愧若此之人見世獲十種福德恭敬且如昇玄經云亦如法服科說知是之人名曰大順眞士不出一生入次聖品若復有人無心奉道倚傍法門窺求利潤汚道法服辱道法流及構惡徒嫉他行善自違科戒勸人莫修不奉師訓聞教愈甚不生慚愧不生恩念如是等人名曰罪逆惡獸近入人道未得人心乍入人倫汚聞聖法所爲趣向尚似隂囚畜獸脫離衆生猶未覺悟憶彼𩔖習欲還本身深所痛哉甚可悲憫若人見在失十種功德失十種恭敬得十種輕賤離十種聖賢五苦八難備具形體纔滅此生當入長夜九幽地獄一切苦痛悉皆備受輪轉三惡無解脫時無想眞人等聞太上說此要言悉皆垂淚歡喜踊躍稽首禮謝信受奉行玄門十事威儀

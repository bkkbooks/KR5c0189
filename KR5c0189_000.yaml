front:
  text: 玄門十事威儀忠二爾時太上老君告無想真人等衆法服科戒已又說威儀十事未與子宣今授此言最為切要如人欲行非足不步欲進妙道非門不入十事科戒為道之門入吾門者欲與仙齊隔離外俗凡夫之人若持十事者名為不凡夫生死因緣罪惡輪轉毀辱法身輕慢法服進道無序善業不生人我自恣無慚愧之心九幽大罪日夜增長行住坐卧出入有法如是凡夫衆生不異真仙大聖不喜見聞天魔神鬼皆所惡嫉人王君長不生恭敬十方男女無不輕薄自無功德長他惡根兩頭營罪苦報何極吾見此輩痛哉寒心今故殷勤重告於子宜遵奉行曉示來學提㩦指掌必令調熟十事成就諸天鑒觀十方人天天魔神鬼悉皆畏敬咸生善意無敢違犯增長福田善果普生功德無量能如是者是我弟子堪傳妙法道宜速近不如是者魔鬼眷屬日夕親近不得逺離無想等聞是妙㫖稽首心驚慚愧悲喜交集涕淚俱下願聞十事威儀彌劫奉行太上曰
